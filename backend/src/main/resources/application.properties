    # ==============================
# Sunucu Ayarlari
# ==============================
server.port=8080

# ==============================
# MySQL Veritabani Baglantisi
# ==============================
# Not: compareai_db veritabanini MySQL'de once olusturman gerekiyor:
#   CREATE DATABASE compareai_db;
spring.datasource.url=jdbc:mysql://localhost:3306/compareai_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Ee123!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate Ayarlari
# ==============================
# update: entity'lerdeki degisiklikleri otomatik olarak tabloya yansitir (gelistirme icin ideal)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==============================
# CORS (React frontend 3000 portundan istek atacak)
# ==============================
# Bu ayari WebConfig.java icinde kod ile de yapacagiz, burasi sadece bilgi amacli

# ==============================
# AI API Key'leri (ileride kullanilacak - simdilik bos birakabilirsin)
# ==============================
openai.api.key=${OPENAI_API_KEY:}
claude.api.key=${CLAUDE_API_KEY:}
gemini.api.key=${GEMINI_API_KEY:}
